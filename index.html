<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshal Parekh — AI/ML Developer</title>
<meta name="description" content="Portfolio for Harshal Parekh, AI/ML Developer -- experience, projects, stack, certifications with proof, and contact links to LinkedIn and GitHub.">
<meta property="og:title" content="Harshal Parekh — AI/ML Developer">
<meta property="og:description" content="AI/ML Developer -- Generative AI, computer vision, and multi-agent systems shipped to production.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0c1116">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%230c1116%27/%3E%3Ctext x=%2750%27 y=%2772%27 font-family=%27ui-monospace,SFMono-Regular,Menlo,monospace%27 font-weight=%27700%27 font-size=%2760%27 fill=%27%23ff7a45%27 text-anchor=%27middle%27%3EH%3C/text%3E%3C/svg%3E">

<style>
  :root{
    --bg:#0c1116;
    --bg-panel:#111820;
    --bg-panel-2:#0f151b;
    --text:#e9e6dc;
    --text-dim:#8b96a3;
    --text-faint:#5a6572;
    --accent:#ff7a45;
    --accent-dim:#a9532f;
    --line:#232f3a;
    --line-soft:#1a232b;
    --ok:#7fd8a0;
    --code-key:#e2a374;
    --code-str:#9db8c9;
    --radius:3px;
  }
  :root[data-theme="light"]{
    --bg:#f3f1ea;
    --bg-panel:#ffffff;
    --bg-panel-2:#ebe8df;
    --text:#171512;
    --text-dim:#5a5650;
    --text-faint:#8a8578;
    --accent:#d9611f;
    --accent-dim:#e59a6c;
    --line:#dcd8cc;
    --line-soft:#e7e3d8;
    --ok:#2f8f5b;
    --code-key:#a8501a;
    --code-str:#3a6b82;
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme="dark"]){
      --bg:#f3f1ea;
      --bg-panel:#ffffff;
      --bg-panel-2:#ebe8df;
      --text:#171512;
      --text-dim:#5a5650;
      --text-faint:#8a8578;
      --accent:#d9611f;
      --accent-dim:#e59a6c;
      --line:#dcd8cc;
      --line-soft:#e7e3d8;
      --ok:#2f8f5b;
      --code-key:#a8501a;
      --code-str:#3a6b82;
    }
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .mono{
    font-family:ui-monospace,SFMono-Regular,"SF Mono","Cascadia Code","JetBrains Mono",Consolas,monospace;
  }

  a{color:inherit;}

  ::selection{background:var(--accent); color:#0c1116;}

  /* ---------- layout shell ---------- */
  .shell{
    display:grid;
    grid-template-columns:220px 1fr;
    max-width:1180px;
    margin:0 auto;
  }
  @media (max-width:860px){
    .shell{grid-template-columns:1fr;}
  }

  nav.rail{
    position:sticky;
    top:0;
    align-self:start;
    height:100vh;
    padding:2.4rem 0 2rem 1.6rem;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  @media (max-width:860px){
    nav.rail{
      position:sticky;
      height:auto;
      padding:0.9rem 1.2rem;
      background:color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line-soft);
      z-index:20;
    }
  }

  .rail-top .brand{
    font-size:0.78rem;
    letter-spacing:0.02em;
    color:var(--text-dim);
  }
  .rail-top .brand strong{color:var(--text); font-weight:600;}
  .rail-top .status{
    margin-top:0.5rem;
    font-size:0.72rem;
    color:var(--ok);
    display:flex;
    align-items:center;
    gap:0.4rem;
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--ok);
    box-shadow:0 0 0 0 rgba(127,216,160,0.5);
    animation:pulse 2.2s ease-out infinite;
    flex:none;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(127,216,160,0.45);}
    70%{box-shadow:0 0 0 6px rgba(127,216,160,0);}
    100%{box-shadow:0 0 0 0 rgba(127,216,160,0);}
  }

  ul.navlinks{
    list-style:none;
    margin:2rem 0 0;
    padding:0;
    font-size:0.82rem;
  }
  @media (max-width:860px){
    ul.navlinks{
      display:flex;
      gap:1.1rem;
      margin:0.7rem 0 0;
      overflow-x:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    ul.navlinks::-webkit-scrollbar{display:none;}
    ul.navlinks li{flex:none;}
  }
  ul.navlinks li{margin-bottom:0.55rem;}
  ul.navlinks a{
    text-decoration:none;
    color:var(--text-faint);
    display:flex;
    align-items:center;
    gap:0.55rem;
    padding:0.15rem 0;
    transition:color 0.15s ease;
    white-space:nowrap;
  }
  ul.navlinks a::before{
    content:"";
    width:14px;height:1px;
    background:var(--text-faint);
    transition:all 0.15s ease;
  }
  ul.navlinks a:hover{color:var(--text);}
  ul.navlinks a.active{color:var(--accent);}
  ul.navlinks a.active::before{background:var(--accent); width:22px;}


  main{
    padding:2.4rem 2.2rem 2rem 2rem;
    min-width:0;
    border-left:1px solid var(--line-soft);
  }
  @media (max-width:860px){
    main{border-left:none; padding:1.6rem 1.2rem 2rem;}
  }

  section{
    padding:3.6rem 0;
    border-bottom:1px solid var(--line-soft);
    opacity:0;
    transform:translateY(10px);
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  section.in{opacity:1; transform:none;}
  section:last-of-type{border-bottom:none;}

  .eyebrow{
    font-size:0.72rem;
    letter-spacing:0.08em;
    text-transform:lowercase;
    color:var(--accent);
    margin:0 0 0.9rem;
  }
  .eyebrow::before{content:"// ";color:var(--text-faint);}

  h1,h2,h3{
    font-weight:600;
    text-wrap:balance;
    margin:0 0 0.6rem;
  }

  /* ---------- hero ---------- */
  #hero{
    padding-top:1.2rem;
    position:relative;
    overflow:hidden;
  }
  #hero canvas{
    position:absolute;
    top:0; right:-2rem;
    width:min(560px, 60vw);
    height:340px;
    opacity:0.4;
    pointer-events:none;
    -webkit-mask-image:radial-gradient(ellipse at center, black 15%, transparent 55%);
    mask-image:radial-gradient(ellipse at center, black 15%, transparent 55%);
  }
  @media (max-width:700px){
    #hero canvas{display:none;}
  }
  #hero .glow{
    position:absolute;
    top:-40px; left:-40px;
    width:500px; height:500px;
    background:radial-gradient(circle, color-mix(in srgb, var(--accent) 13%, transparent) 0%, color-mix(in srgb, var(--accent) 5%, transparent) 35%, transparent 65%);
    pointer-events:none;
    z-index:0;
  }
  #hero .hero-inner{position:relative; z-index:1;}
  .avatar{
    width:96px; height:96px;
    border-radius:50%;
    object-fit:cover;
    object-position:center 15%;
    border:1px solid var(--line);
    margin-bottom:1rem;
    display:block;
  }
  .avatar-placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg-panel);
    color:var(--text-faint);
    font-size:1.4rem;
    font-weight:700;
  }
  #hero h1{
    font-size:clamp(2.1rem, 5vw, 3.25rem);
    letter-spacing:-0.01em;
    line-height:1.08;
    max-width:18ch;
  }
  #hero h1 .accent-word{color:var(--accent);}
  #hero .role{
    font-size:1.05rem;
    color:var(--text-dim);
    margin:0 0 1.6rem;
    max-width:44ch;
  }
  #hero .pitch{
    max-width:60ch;
    color:var(--text-dim);
    font-size:0.98rem;
  }

  /* ---------- about ---------- */
  #about p{max-width:66ch; color:var(--text-dim);}
  #about p strong{color:var(--text); font-weight:600;}

  /* ---------- experience: pipeline ---------- */
  .pipeline{position:relative; padding-left:1.6rem;}
  .pipeline::before{
    content:"";
    position:absolute;
    left:4px; top:6px; bottom:6px;
    width:1px;
    background:var(--line);
  }
  .stage{position:relative; margin-bottom:2.6rem;}
  .stage:last-child{margin-bottom:0;}
  .stage-node{
    position:absolute;
    left:-1.6rem; top:0.35rem;
    width:9px; height:9px;
    border-radius:50%;
    background:var(--bg);
    border:1px solid var(--text-faint);
  }
  .stage.running .stage-node{
    border-color:var(--accent);
    background:var(--accent);
    animation:pulse 2.2s ease-out infinite;
    box-shadow:none;
  }
  .stage-head{
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    gap:0.6rem;
    margin-bottom:0.3rem;
  }
  .stage-head h3{font-size:1.08rem; margin:0;}
  .badge{
    font-size:0.66rem;
    letter-spacing:0.04em;
    padding:0.15rem 0.45rem;
    border-radius:2px;
    text-transform:uppercase;
  }
  .badge.running{color:var(--accent); border:1px solid var(--accent-dim); background:color-mix(in srgb, var(--accent) 12%, transparent);}
  .badge.done{color:var(--text-faint); border:1px solid var(--line);}
  .stage-meta{
    font-size:0.78rem;
    color:var(--text-faint);
    margin-bottom:0.7rem;
  }
  .stage ul{
    margin:0;
    padding-left:1.1rem;
    color:var(--text-dim);
    font-size:0.93rem;
  }
  .stage li{margin-bottom:0.4rem;}
  .stage li:last-child{margin-bottom:0;}

  /* ---------- projects ---------- */
  .cards{
    display:grid;
    grid-template-columns:1fr;
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
  }
  @media (min-width:700px){
    .cards{grid-template-columns:repeat(3,1fr);}
  }
  .card{
    background:var(--bg-panel);
    padding:1.3rem 1.3rem 1.4rem;
    display:flex;
    flex-direction:column;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:0.5rem;
    margin-bottom:0.35rem;
  }
  .card h3{font-size:0.98rem; margin:0;}
  .card .ver{font-size:0.68rem; color:var(--text-faint); white-space:nowrap;}
  .card p{
    font-size:0.87rem;
    color:var(--text-dim);
    margin:0 0 0.9rem;
    flex:1;
  }
  .tags{display:flex; flex-wrap:wrap; gap:0.4rem;}
  .tag{
    font-size:0.68rem;
    padding:0.18rem 0.42rem;
    border:1px solid var(--line);
    color:var(--text-faint);
    border-radius:2px;
  }
  .card{
    position:relative;
    transition:background 0.2s ease, transform 0.2s ease;
  }
  .card:hover{
    background:var(--bg-panel-2);
    transform:translateY(-2px);
  }
  .repo-link{
    margin-top:0.9rem;
    padding-top:0.8rem;
    border-top:1px solid var(--line-soft);
    display:flex;
    align-items:center;
    gap:0.5rem;
    font-size:0.72rem;
    color:var(--text-faint);
    text-decoration:none;
  }
  .repo-link .m{color:var(--ok); font-weight:700; flex:none;}
  .repo-link .arrow{
    margin-left:auto;
    color:var(--text-faint);
    transition:transform 0.15s ease, color 0.15s ease;
  }
  .repo-link:hover{color:var(--text);}
  .repo-link:hover .arrow{color:var(--accent); transform:translateX(3px);}

  /* ---------- stack: manifest ---------- */
  .manifest{
    background:var(--bg-panel);
    border:1px solid var(--line);
    padding:1.4rem 1.6rem;
    font-size:0.86rem;
    overflow-x:auto;
  }
  .manifest .row{
    display:flex;
    gap:0.6rem;
    padding:0.28rem 0;
    align-items:baseline;
    flex-wrap:wrap;
  }
  .manifest .key{color:var(--code-key); flex:none; min-width:11ch;}
  .manifest .key::after{content:":";}
  .manifest .val{color:var(--code-str);}
  .manifest .val .sep{color:var(--text-faint);}

  /* ---------- certs ---------- */
  .certlist{list-style:none; margin:0; padding:0; font-size:0.9rem;}
  .certlist li{
    display:grid;
    grid-template-columns: 1fr 5.5rem 8rem;
    column-gap:1rem;
    row-gap:0.3rem;
    align-items:start;
    padding:0.6rem 0;
    border-bottom:1px solid var(--line-soft);
    color:var(--text-dim);
  }
  .certlist li:last-child{border-bottom:none;}
  .cert-main{min-width:0;}
  .certlist .cert-name{color:var(--text); display:block;}
  .cert-issuer{color:var(--text-faint); font-size:0.78rem; margin-top:0.15rem;}
  .cert-date{
    color:var(--text-faint);
    font-size:0.8rem;
    white-space:nowrap;
    padding-top:0.1rem;
  }
  .cert-actions{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:0.4rem;
  }
  .cert-verify{
    font-size:0.7rem;
    color:var(--text-faint);
    text-decoration:none;
    white-space:nowrap;
  }
  .cert-verify:hover{color:var(--accent);}
  @media (max-width:600px){
    .certlist li{ grid-template-columns: 1fr; row-gap:0.35rem; }
    .cert-date{ padding-top:0; }
    .cert-actions{ flex-direction:row; align-items:center; justify-content:flex-start; flex-wrap:wrap; gap:0.6rem; }
  }

  /* ---------- contact: endpoints ---------- */
  .endpoints{border:1px solid var(--line);}
  .endpoint{
    display:flex;
    align-items:center;
    gap:0.9rem;
    padding:0.95rem 1.1rem;
    border-bottom:1px solid var(--line-soft);
    text-decoration:none;
    color:var(--text);
    transition:background 0.15s ease;
  }
  .endpoint:last-child{border-bottom:none;}
  .endpoint:hover{background:var(--bg-panel-2);}
  .endpoint:hover .resp{opacity:1; transform:none;}
  .method{
    font-size:0.68rem;
    font-weight:700;
    padding:0.15rem 0.4rem;
    border-radius:2px;
    flex:none;
    width:3.6rem;
    text-align:center;
  }
  .method.get{color:var(--ok); border:1px solid color-mix(in srgb, var(--ok) 50%, transparent);}
  .method.post{color:var(--accent); border:1px solid var(--accent-dim);}
  .endpoint .path{font-size:0.92rem; flex:1; min-width:0;}
  .endpoint .path small{display:block; color:var(--text-faint); font-size:0.76rem; margin-top:0.1rem;}
  .endpoint .resp{
    font-size:0.72rem;
    color:var(--text-faint);
    flex:none;
    opacity:0;
    transform:translateX(-4px);
    transition:all 0.15s ease;
  }
  @media (max-width:520px){
    .endpoint .resp{display:none;}
  }
  .direct{
    margin-top:1.1rem;
    font-size:0.8rem;
    color:var(--text-faint);
  }
  .direct a{color:var(--text-dim); text-decoration:underline; text-decoration-color:var(--line);}

  footer{
    padding:1.6rem 0 2.4rem;
    font-size:0.72rem;
    color:var(--text-faint);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:0.6rem;
  }

  .cert-proof{
    font-size: 0.7rem;
    color: var(--accent);
    background: none;
    border: 1px solid var(--accent-dim);
    border-radius: 2px;
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .cert-proof:hover{ background: color-mix(in srgb, var(--accent) 14%, transparent); }
  .cert-proof:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  #lightbox{
    position: fixed;
    inset: 0;
    background: color-mix(in srgb, var(--bg) 82%, black 18%);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 2rem;
  }
  #lightbox.open{ display: flex; }
  #lightbox .lb-frame{
    display: flex;
    flex-direction: column;
    max-width: min(900px, 100%);
    max-height: 88vh;
    width: 100%;
  }
  #lightbox .lb-toolbar{
    display: flex;
    justify-content: flex-end;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }
  #lightbox img{
    width: 100%;
    height: auto;
    max-height: 80vh;
    object-fit: contain;
    border: 1px solid var(--line);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    background: #fff;
  }
  #lightbox .lb-btn{
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 0.8rem;
    padding: 0.35rem 0.7rem;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
  }
  #lightbox .lb-btn:hover{ border-color: var(--accent); color: var(--accent); }
  #lightbox .lb-download{ color: var(--accent); border-color: var(--accent-dim); }

  #admin-fab{ cursor:pointer; }
</style>

</head>
<body>

<div class="shell" id="shell">
  <nav class="rail">
    <div class="rail-top">
      <div class="brand mono"><strong>harshal</strong>.parekh</div>
      <div class="status mono"><span class="dot"></span> <span id="status-text"></span></div>
      <ul class="navlinks mono" id="nav-links"></ul>
    </div>
  </nav>

  <main id="main-content"></main>
</div>

<div id="lightbox" role="dialog" aria-modal="true" aria-label="Certificate preview">
  <div class="lb-frame">
    <div class="lb-toolbar">
      <a id="lightbox-download" class="lb-btn lb-download mono" download>download ↓</a>
      <button class="lb-btn mono" onclick="closeCert()">close ✕</button>
    </div>
    <div id="lightbox-body"></div>
  </div>
</div>


<script>
  var SITE = null;

  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function renderNav(){
    var sections = ['about','education','experience','projects','stack','certs','resume','connect'];
    document.getElementById('nav-links').innerHTML = sections.map(function(id){
      return '<li><a href="#'+id+'" data-nav>'+id+'</a></li>';
    }).join('');
  }

  function initials(name){
    return String(name).trim().split(/\s+/).map(function(w){ return w[0] || ''; }).join('').slice(0,2).toUpperCase();
  }

  function renderAvatar(h){
    if(h.photo){
      return '<img class="avatar" src="assets/'+esc(h.photo)+'" alt="'+esc(h.name)+'">';
    }
    return '<div class="avatar avatar-placeholder mono">'+esc(initials(h.name))+'</div>';
  }

  function renderHero(){
    var h = SITE.hero;
    return '<section id="hero">'
      + '<div class="glow"></div>'
      + '<canvas id="graph" aria-hidden="true"></canvas>'
      + '<div class="hero-inner">'
      + renderAvatar(h)
      + '<p class="eyebrow mono">'+esc(h.eyebrow)+'</p>'
      + '<h1>'+esc(h.name)+'</h1>'
      + '<p class="role">'+esc(h.role)+'</p>'
      + '<p class="pitch">'+esc(h.pitch)+'</p>'
      + '</div></section>';
  }

  function renderAbout(){
    return '<section id="about">'
      + '<p class="eyebrow mono">about</p><h2>Profile</h2>'
      + '<p>'+SITE.about+'</p>'
      + '</section>';
  }

  function renderEducation(){
    var e = SITE.education;
    var transcriptBtn = e.transcriptKey ? '<button class="cert-proof mono" data-cert="'+e.transcriptKey+'" onclick="openCert(this)">view transcript →</button>' : '';
    return '<section id="education">'
      + '<p class="eyebrow mono">education</p><h2>Degree</h2>'
      + '<ul class="certlist"><li><div class="cert-main">'
      + '<span class="cert-name">'+esc(e.degree)+'</span>'
      + '<span class="cert-issuer">'+esc(e.issuer)+'</span></div>'
      + '<span class="cert-date mono">'+esc(e.date)+'</span>'
      + '<span class="cert-actions">'
      + '<button class="cert-proof mono" data-cert="'+e.certKey+'" onclick="openCert(this)">view proof →</button>'
      + transcriptBtn
      + '</span></li></ul></section>';
  }

  function renderExperience(){
    var stages = SITE.experience.map(function(s){
      var badge = s.status === 'running' ? 'running' : 'done';
      var badgeLabel = s.status === 'running' ? 'running' : 'complete';
      return '<div class="stage '+badge+'"><div class="stage-node"></div>'
        + '<div class="stage-head"><h3>'+esc(s.title)+'</h3><span class="badge '+badge+' mono">'+badgeLabel+'</span></div>'
        + '<div class="stage-meta mono">'+esc(s.org)+' · '+esc(s.location)+' · '+esc(s.dates)+'</div>'
        + '<ul>'+s.bullets.map(function(b){return '<li>'+esc(b)+'</li>';}).join('')+'</ul>'
        + '</div>';
    }).join('');
    return '<section id="experience"><p class="eyebrow mono">experience</p><h2>Where the pipeline has run</h2>'
      + '<div class="pipeline">'+stages+'</div></section>';
  }

  function renderProjects(){
    var cards = SITE.projects.map(function(p){
      return '<div class="card"><div class="card-top"><h3>'+esc(p.name)+'</h3><span class="ver mono">'+esc(p.ver)+'</span></div>'
        + '<p>'+esc(p.description)+'</p>'
        + '<div class="tags mono">'+p.tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</div>'
        + '<a class="repo-link mono" href="'+esc(p.repo)+'" target="_blank" rel="noopener"><span class="m">GET</span> /repo <span class="arrow">view source →</span></a>'
        + '</div>';
    }).join('');
    return '<section id="projects"><p class="eyebrow mono">projects</p><h2>Shipped independently</h2>'
      + '<div class="cards">'+cards+'</div></section>';
  }

  function renderStack(){
    var rows = SITE.stack.map(function(r){
      return '<div class="row"><span class="key">'+esc(r.key)+'</span><span class="val">'+esc(r.value).replace(/ · /g, ' <span class="sep">·</span> ')+'</span></div>';
    }).join('');
    return '<section id="stack"><p class="eyebrow mono">stack</p><h2>stack.yaml</h2>'
      + '<div class="manifest mono">'+rows+'</div></section>';
  }

  function renderCerts(){
    var items = SITE.certs.map(function(c){
      var verify = c.verifyUrl ? '<a class="cert-verify mono" href="'+esc(c.verifyUrl)+'" target="_blank" rel="noopener">verify →</a>' : '';
      var proof = c.certKey ? '<button class="cert-proof mono" data-cert="'+c.certKey+'" onclick="openCert(this)">view proof →</button>' : '';
      return '<li><div class="cert-main"><span class="cert-name">'+esc(c.name)+'</span>'
        + '<span class="cert-issuer">'+esc(c.issuer)+'</span></div>'
        + '<span class="cert-date mono">'+esc(c.date)+'</span>'
        + '<span class="cert-actions">'+verify+proof+'</span></li>';
    }).join('');
    return '<section id="certs"><p class="eyebrow mono">certifications</p><h2>Verified</h2>'
      + '<ul class="certlist">'+items+'</ul></section>';
  }

  function renderResume(){
    return '<section id="resume"><p class="eyebrow mono">resume</p><h2>Resume</h2>'
      + '<button class="cert-proof mono" data-cert="'+SITE.resume.certKey+'" onclick="openCert(this)">view resume →</button>'
      + '</section>';
  }

  function renderConnect(){
    var endpoints = SITE.connect.map(function(c){
      var cls = c.method === 'GET' ? 'get' : 'post';
      return '<a class="endpoint" href="'+esc(c.href)+'" target="_blank" rel="noopener">'
        + '<span class="method '+cls+'">'+esc(c.method)+'</span>'
        + '<span class="path">'+esc(c.path)+'<small>'+esc(c.sub)+'</small></span>'
        + '<span class="resp">'+esc(c.resp)+'</span></a>';
    }).join('');
    return '<section id="connect"><p class="eyebrow mono">connect</p><h2>Endpoints</h2>'
      + '<div class="endpoints mono">'+endpoints+'</div>'
      + '<p class="direct">'+esc(SITE.direct)+'</p></section>';
  }

  function renderFooter(){
    return '<footer class="mono"><span id="admin-fab" title="">'+esc(SITE.footer)+'</span></footer>';
  }

  function renderAll(){
    document.getElementById('status-text').textContent = SITE.status.replace('open_to_work — ', '');
    document.querySelector('.status').innerHTML = '<span class="dot"></span> ' + esc(SITE.status);
    renderNav();
    document.getElementById('main-content').innerHTML =
      renderHero() + renderAbout() + renderEducation() + renderExperience()
      + renderProjects() + renderStack() + renderCerts() + renderResume()
      + renderConnect() + renderFooter();
    document.getElementById('admin-fab').addEventListener('click', function(){
      location.href = 'https://harshal-portfolio-admin.vercel.app/';
    });
  }

  function initInteractions(){
    var sections = document.querySelectorAll('section[id]');
    var links = document.querySelectorAll('a[data-nav]');
    var map = {};
    links.forEach(function(l){ map[l.getAttribute('href').slice(1)] = l; });

    var revealObs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('in'); }
      });
    }, {threshold:0.08});
    sections.forEach(function(s){ revealObs.observe(s); });

    var navObs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        var link = map[e.target.id];
        if(!link) return;
        if(e.isIntersecting){
          links.forEach(function(l){ l.classList.remove('active'); });
          link.classList.add('active');
        }
      });
    }, {rootMargin:'-40% 0px -50% 0px'});
    sections.forEach(function(s){ navObs.observe(s); });
  }

  function initCanvas(){
    var canvas = document.getElementById('graph');
    if(!canvas) return;
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var ctx = canvas.getContext('2d');
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w, h, nodes;

    function accentColor(){
      return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#ff7a45';
    }
    function hexToRgb(hex){
      hex = hex.replace('#','');
      var n = parseInt(hex,16);
      return [(n>>16)&255,(n>>8)&255,n&255];
    }

    function size(){
      var rect = canvas.getBoundingClientRect();
      w = rect.width; h = rect.height;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }

    function makeNodes(){
      var count = w < 400 ? 10 : 16;
      nodes = [];
      for(var i=0;i<count;i++){
        nodes.push({
          x: Math.random()*w,
          y: Math.random()*h,
          vx: (Math.random()-0.5)*0.18,
          vy: (Math.random()-0.5)*0.18,
          r: Math.random()*1.6 + 1.2
        });
      }
    }

    function frame(){
      var rgb = hexToRgb(accentColor());
      ctx.clearRect(0,0,w,h);
      for(var i=0;i<nodes.length;i++){
        var n = nodes[i];
        n.x += n.vx; n.y += n.vy;
        if(n.x < 0 || n.x > w) n.vx *= -1;
        if(n.y < 0 || n.y > h) n.vy *= -1;
      }
      for(var i=0;i<nodes.length;i++){
        for(var j=i+1;j<nodes.length;j++){
          var a = nodes[i], b = nodes[j];
          var dx = a.x-b.x, dy = a.y-b.y;
          var dist = Math.sqrt(dx*dx+dy*dy);
          var max = 140;
          if(dist < max){
            ctx.strokeStyle = 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(0.22*(1-dist/max))+')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
            ctx.stroke();
          }
        }
      }
      for(var i=0;i<nodes.length;i++){
        var n = nodes[i];
        ctx.fillStyle = 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0.85)';
        ctx.beginPath();
        ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fill();
      }
      if(!reduce) requestAnimationFrame(frame);
    }

    size();
    makeNodes();
    frame();
    window.addEventListener('resize', function(){ size(); makeNodes(); if(reduce) frame(); });
  }

  function openCert(btn){
    var filename = btn.getAttribute('data-cert');
    if(!filename) return;
    var url = 'assets/' + filename;
    if(filename.toLowerCase().endsWith('.pdf')){
      window.open(url, '_blank');
      return;
    }
    var body = document.getElementById('lightbox-body');
    body.innerHTML = '<img src="' + url + '" alt="Certificate preview">';
    document.getElementById('lightbox-download').href = url;
    document.getElementById('lightbox-download').download = filename;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeCert(){
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-body').innerHTML = '';
  }
  document.getElementById('lightbox').addEventListener('click', function(e){
    if(e.target.id === 'lightbox') closeCert();
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeCert();
  });

  fetch('content.json', {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      SITE = data;
      renderAll();
      initInteractions();
      initCanvas();
    })
    .catch(function(err){
      document.getElementById('main-content').innerHTML = '<p style="padding:2rem;color:#e9e6dc">Failed to load site content.</p>';
      console.error(err);
    });
</script>

</body>
